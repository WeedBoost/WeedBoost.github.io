<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Informacje o urządzeniu</title>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}
body{
background:#0d1117;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
color:white;
padding:20px;
}
.box{
width:500px;
background:#161b22;
border-radius:15px;
padding:25px;
box-shadow:0 0 20px rgba(0,0,0,.5);
}
h1{
text-align:center;
margin-bottom:20px;
color:#58a6ff;
}
.item{
display:flex;
justify-content:space-between;
padding:10px 0;
border-bottom:1px solid #30363d;
}
.value{
color:#58a6ff;
word-break:break-word;
text-align:right;
}
</style>
</head>
<body>
<div class="box">
<h1>Twoje informacje</h1>
<div class="item"><span>🌐 Adres IP</span><span class="value" id="ip">Ładowanie...</span></div>
<div class="item"><span>🏙️ Miasto</span><span class="value" id="city">...</span></div>
<div class="item"><span>🗺️ Region</span><span class="value" id="region">...</span></div>
<div class="item"><span>🇵🇱 Kraj</span><span class="value" id="country">...</span></div>
<div class="item"><span>📡 Dostawca internetu</span><span class="value" id="isp">...</span></div>
<div class="item"><span>🕒 Strefa czasowa</span><span class="value" id="timezone">...</span></div>
<div class="item"><span>📱 Typ urządzenia</span><span class="value" id="device"></span></div>
<div class="item"><span>💻 System</span><span class="value" id="os"></span></div>
<div class="item"><span>🌐 Przeglądarka</span><span class="value" id="browser"></span></div>
<div class="item"><span>🗣️ Język</span><span class="value" id="lang"></span></div>
<div class="item"><span>🖥️ Rozdzielczość</span><span class="value" id="screen"></span></div>
<div class="item"><span>🧠 Rdzenie CPU</span><span class="value" id="cpu"></span></div>
<div class="item"><span>💾 RAM</span><span class="value" id="ram"></span></div>
<div class="item"><span>🌙 Motyw</span><span class="value" id="theme"></span></div>
<div class="item"><span>🌐 Status</span><span class="value" id="online"></span></div>
<div class="item"><span>📅 Data i godzina</span><span class="value" id="time"></span></div>
</div>
<script>
fetch("https://ipapi.co/json/")
.then(r=>r.json())
.then(data=>{
document.getElementById("ip").textContent=data.ip;
document.getElementById("city").textContent=data.city;
document.getElementById("region").textContent=data.region;
document.getElementById("country").textContent=data.country_name;
document.getElementById("isp").textContent=data.org;
document.getElementById("timezone").textContent=data.timezone;
});
const ua=navigator.userAgent;
let browser="Nieznana";
if(ua.includes("Chrome")) browser="Google Chrome";
if(ua.includes("Firefox")) browser="Mozilla Firefox";
if(ua.includes("Safari")&&!ua.includes("Chrome")) browser="Safari";
if(ua.includes("Edg")) browser="Microsoft Edge";
let os="Nieznany";
if(ua.includes("Windows")) os="Windows";
if(ua.includes("Android")) os="Android";
if(ua.includes("iPhone")) os="iPhone (iOS)";
if(ua.includes("iPad")) os="iPad (iPadOS)";
if(ua.includes("Mac")) os="macOS";
if(ua.includes("Linux")) os="Linux";
document.getElementById("browser").textContent=browser;
document.getElementById("os").textContent=os;
document.getElementById("device").textContent=
/Mobi|Android|iPhone|iPad/i.test(ua)
?"Telefon / Tablet":"Komputer";
document.getElementById("lang").textContent=navigator.language;
document.getElementById("screen").textContent=
screen.width+" × "+screen.height;
document.getElementById("cpu").textContent=
navigator.hardwareConcurrency||"Brak danych";
document.getElementById("ram").textContent=
navigator.deviceMemory
?navigator.deviceMemory+" GB"
:"Brak danych";
document.getElementById("theme").textContent=
window.matchMedia("(prefers-color-scheme: dark)").matches
?"Ciemny":"Jasny";
document.getElementById("online").textContent=
navigator.onLine?"Online":"Offline";
function updateTime(){
document.getElementById("time").textContent=
new Date().toLocaleString("pl-PL");
}
updateTime();
setInterval(updateTime,1000);
</script>
</body>
</html>
