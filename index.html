<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twoje Dane Sieciowe</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 800px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-weight: 600;
            margin-bottom: 30px;
            text-align: center;
            color: var(--text-main);
            font-size: 1.5rem;
            letter-spacing: 1px;
        }

        h1 span {
            color: var(--accent);
        }

        .data-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .data-item {
            background: rgba(15, 23, 42, 0.4);
            padding: 15px 20px;
            border-radius: 8px;
            border-left: 4px solid var(--accent);
        }

        .data-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 0.5px;
            margin-bottom: 5px;
        }

        .data-value {
            font-size: 1rem;
            font-weight: 400;
            word-break: break-word;
        }

        .loading {
            color: var(--text-muted);
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Digital <span>Footprint</span></h1>
        
        <div class="data-grid">
            <div class="data-item">
                <div class="data-label">Adres IP</div>
                <div class="data-value" id="ip"><span class="loading">Ładowanie...</span></div>
            </div>
            <div class="data-item">
                <div class="data-label">Miejscowość</div>
                <div class="data-value" id="city"><span class="loading">Ładowanie...</span></div>
            </div>
            <div class="data-item">
                <div class="data-label">Region / Powiat</div>
                <div class="data-value" id="region"><span class="loading">Ładowanie...</span></div>
            </div>
            <div class="data-item">
                <div class="data-label">Dostawca Internetu (ISP)</div>
                <div class="data-value" id="isp"><span class="loading">Ładowanie...</span></div>
            </div>

            <div class="data-item">
                <div class="data-label">System / Platforma</div>
                <div class="data-value" id="platform"></div>
            </div>
            <div class="data-item" style="grid-column: 1 / -1;">
                <div class="data-label">Urządzenie (User-Agent)</div>
                <div class="data-value" id="user-agent"></div>
            </div>
            <div class="data-item">
                <div class="data-label">Rozdzielczość ekranu</div>
                <div class="data-value" id="resolution"></div>
            </div>
            <div class="data-item">
                <div class="data-label">Język systemowy</div>
                <div class="data-value" id="language"></div>
            </div>
            <div class="data-item">
                <div class="data-label">Rdzenie procesora</div>
                <div class="data-value" id="cores"></div>
            </div>
            <div class="data-item">
                <div class="data-label">Pamięć RAM</div>
                <div class="data-value" id="ram"></div>
            </div>
            <div class="data-item">
                <div class="data-label">Strefa czasowa</div>
                <div class="data-value" id="timezone"></div>
            </div>
        </div>
    </div>

    <script>
        // Pobieranie danych z przeglądarki (natychmiastowe)
        document.getElementById('platform').textContent = navigator.platform || "Nieznana";
        document.getElementById('user-agent').textContent = navigator.userAgent;
        document.getElementById('resolution').textContent = ${screen.width} x ${screen.height};
        document.getElementById('language').textContent = navigator.language;
        document.getElementById('cores').textContent = navigator.hardwareConcurrency ? ${navigator.hardwareConcurrency} rdzeni : "Brak dostępu";
        document.getElementById('ram').textContent = navigator.deviceMemory ? ~${navigator.deviceMemory} GB : "Brak dostępu";
        document.getElementById('timezone').textContent = Intl.DateTimeFormat().resolvedOptions().timeZone;

        // Pobieranie danych o IP i lokalizacji (asynchroniczne przez darmowe API ipapi.co)
        fetch('https://ipapi.co/json/')
            .then(response => response.json())
            .then(data => {
                if(data.error) {
                    throw new Error("Limit zapytań API");
                }
                document.getElementById('ip').textContent = data.ip || "Brak danych";
                document.getElementById('city').textContent = data.city || "Brak danych";
                document.getElementById('region').textContent = data.region || "Brak danych";
                document.getElementById('isp').textContent = data.org || "Brak danych";
            })
            .catch(error => {
                console.error('Błąd pobierania danych IP:', error);
                document.getElementById('ip').textContent = "Błąd pobierania";
                document.getElementById('city').textContent = "Błąd pobierania";
                document.getElementById('region').textContent = "Błąd pobierania";
                document.getElementById('isp').textContent = "Błąd pobierania";
            });
    </script>
</body>
</html>
