<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ur cooked</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Consolas, monospace;
}

body{
background:#000;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
color:red;
padding:20px;
}

.box{
width:500px;
background:#050505;
border:1px solid red;
border-radius:15px;
padding:25px;
box-shadow:0 0 25px red;
}

h1{
text-align:center;
margin-bottom:25px;
font-size:40px;
color:red;
text-shadow:0 0 15px red;
}

.item{
display:flex;
justify-content:space-between;
padding:10px 0;
border-bottom:1px solid #500;
}

.value{
color:#ff3333;
text-align:right;
word-break:break-word;
}

</style>
</head>

<body>

<div class="box">

<h1>ur cooked</h1>

<div class="item"><span>🌐 IP</span><span class="value" id="ip">...</span></div>
<div class="item"><span>🏙️ Miasto</span><span class="value" id="city">...</span></div>
<div class="item"><span>🗺️ Region</span><span class="value" id="region">...</span></div>
<div class="item"><span>🇵🇱 Kraj</span><span class="value" id="country">...</span></div>
<div class="item"><span>📡 Internet</span><span class="value" id="isp">...</span></div>
<div class="item"><span>🕒 Strefa</span><span class="value" id="timezone">...</span></div>

<div class="item"><span>📱 Urządzenie</span><span class="value" id="device"></span></div>
<div class="item"><span>💻 System</span><span class="value" id="os"></span></div>
<div class="item"><span>🌐 Przeglądarka</span><span class="value" id="browser"></span></div>
<div class="item"><span>🗣️ Język</span><span class="value" id="lang"></span></div>
<div class="item"><span>🖥️ Ekran</span><span class="value" id="screen"></span></div>
<div class="item"><span>🧠 CPU</span><span class="value" id="cpu"></span></div>
<div class="item"><span>💾 RAM</span><span class="value" id="ram"></span></div>
<div class="item"><span>🌙 Motyw</span><span class="value" id="theme"></span></div>
<div class="item"><span>🌐 Status</span><span class="value" id="online"></span></div>
<div class="item"><span>📅 Czas</span><span class="value" id="time"></span></div>

</div>


<script>

function typeText(id,text,speed=35){

const el=document.getElementById(id);
el.textContent="";
let i=0;

function write(){

if(i<text.length){
el.textContent+=text[i];
i++;
setTimeout(write,speed);
}

}

write();

}


fetch("https://ipapi.co/json/")
.then(r=>r.json())
.then(data=>{

setTimeout(()=>typeText("ip",data.ip),500);
setTimeout(()=>typeText("city",data.city),1000);
setTimeout(()=>typeText("region",data.region),1500);
setTimeout(()=>typeText("country",data.country_name),2000);
setTimeout(()=>typeText("isp",data.org),2500);
setTimeout(()=>typeText("timezone",data.timezone),3000);

});


const ua=navigator.userAgent;


let browser="Nieznana";

if(ua.includes("Chrome")) browser="Chrome";
if(ua.includes("Firefox")) browser="Firefox";
if(ua.includes("Safari")&&!ua.includes("Chrome")) browser="Safari";


let os="Nieznany";

if(ua.includes("Windows")) os="Windows";
if(ua.includes("Android")) os="Android";
if(ua.includes("iPhone")) os="iOS";
if(ua.includes("Mac")) os="macOS";
if(ua.includes("Linux")) os="Linux";


setTimeout(()=>typeText("browser",browser),3500);
setTimeout(()=>typeText("os",os),4000);

setTimeout(()=>typeText(
"device",
/Mobi|Android|iPhone|iPad/i.test(ua)
?"Telefon / Tablet"
:"Komputer"
),4500);


setTimeout(()=>typeText("lang",navigator.language),5000);


setTimeout(()=>typeText(
"screen",
screen.width+" x "+screen.height
),5500);


setTimeout(()=>typeText(
"cpu",
navigator.hardwareConcurrency || "Brak danych"
),6000);


setTimeout(()=>typeText(
"ram",
navigator.deviceMemory ? navigator.deviceMemory+" GB" : "Brak danych"
),6500);


setTimeout(()=>typeText(
"theme",
window.matchMedia("(prefers-color-scheme: dark)").matches
?"Ciemny":"Jasny"
),7000);


setTimeout(()=>typeText(
"online",
navigator.onLine ? "Online":"Offline"
),7500);



function updateTime(){

document.getElementById("time").textContent=
new Date().toLocaleString("pl-PL");

}

updateTime();
setInterval(updateTime,1000);


</script>

</body>
</html>
